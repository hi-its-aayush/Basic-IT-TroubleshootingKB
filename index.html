<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Knowledge Base // Aayush</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0e13;
    --bg2: #111620;
    --bg3: #161c28;
    --border: #1e2a3a;
    --border2: #243040;
    --green: #00e676;
    --green-dim: #00b85a;
    --green-glow: rgba(0,230,118,0.12);
    --amber: #ffb300;
    --amber-dim: rgba(255,179,0,0.12);
    --red: #ff5252;
    --red-dim: rgba(255,82,82,0.1);
    --blue: #42a5f5;
    --blue-dim: rgba(66,165,245,0.1);
    --purple: #ce93d8;
    --text: #c9d4e3;
    --text2: #7a8fa8;
    --text3: #4a5a6e;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 1.5rem; height: 56px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 100;
  }
  .topbar-brand { font-family: var(--mono); font-size: 13px; letter-spacing: 0.02em; display: flex; align-items: center; gap: 10px; }
  .topbar-brand .prompt { color: var(--green); }
  .cursor { display: inline-block; width: 8px; height: 15px; background: var(--green); animation: blink 1.1s step-end infinite; vertical-align: middle; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .search-wrap { position: relative; display: flex; align-items: center; }
  .search-icon { position: absolute; left: 10px; width: 14px; height: 14px; color: var(--text3); pointer-events: none; }
  #searchInput {
    font-family: var(--mono); font-size: 12px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); padding: 7px 12px 7px 32px; width: 280px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #searchInput::placeholder { color: var(--text3); }
  #searchInput:focus { border-color: var(--green-dim); box-shadow: 0 0 0 3px var(--green-glow); }
  .stat-pill { font-family: var(--mono); font-size: 11px; background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; color: var(--text2); white-space: nowrap; }
  .stat-pill span { color: var(--green); }

  .shell { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 230px; min-width: 230px; background: var(--bg2); border-right: 1px solid var(--border);
    padding: 1.25rem 0; overflow-y: auto; position: sticky; top: 56px; height: calc(100vh - 56px);
  }
  .sidebar-section-label {
    font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text3); padding: 0 1.25rem 0.5rem; margin-top: 1rem;
  }
  .sidebar-section-label:first-child { margin-top: 0; }
  .cat-btn {
    display: flex; align-items: center; gap: 10px; width: 100%; padding: 7px 1.25rem;
    font-family: var(--sans); font-size: 13px; color: var(--text2); background: none; border: none;
    border-left: 2px solid transparent; cursor: pointer; text-align: left; transition: background 0.15s, color 0.15s;
  }
  .cat-btn:hover { background: var(--bg3); color: var(--text); }
  .cat-btn.active { color: var(--green); background: var(--green-glow); border-left-color: var(--green); }
  .cat-icon { width: 16px; text-align: center; font-size: 13px; flex-shrink: 0; }
  .cat-count { margin-left: auto; font-family: var(--mono); font-size: 10px; background: var(--bg3); color: var(--text3); padding: 2px 6px; border-radius: 10px; border: 1px solid var(--border); }
  .cat-btn.active .cat-count { background: var(--green-glow); color: var(--green-dim); border-color: var(--green-dim); }
  .sidebar-divider { height: 1px; background: var(--border); margin: 0.75rem 0; }

  .sev-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-high { background: var(--red); }
  .dot-med  { background: var(--amber); }
  .dot-low  { background: var(--green); }

  .main { flex: 1; overflow-y: auto; padding: 1.75rem 2rem; }
  .view-header { margin-bottom: 1.25rem; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .view-title { font-family: var(--mono); font-size: 20px; color: var(--text); font-weight: 400; }
  .view-title .accent { color: var(--green); }
  .view-meta { font-family: var(--mono); font-size: 11px; color: var(--text3); }

  .active-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; min-height: 0; }
  .filter-badge {
    font-family: var(--mono); font-size: 11px; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--green-dim); color: var(--green); background: var(--green-glow);
    display: flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .filter-badge .x { opacity: 0.6; }
  .filter-badge:hover .x { opacity: 1; }

  .articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1rem; }

  .article-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 1rem 1.2rem; cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .article-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--green); opacity: 0; transition: opacity 0.2s; }
  .article-card:hover { border-color: var(--border2); background: var(--bg3); transform: translateY(-1px); }
  .article-card:hover::before { opacity: 1; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.5rem; }
  .card-severity { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 3px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
  .sev-high { background: var(--red-dim); color: var(--red); border: 1px solid rgba(255,82,82,0.25); }
  .sev-med  { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(255,179,0,0.25); }
  .sev-low  { background: var(--green-glow); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
  .sev-info { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(66,165,245,0.25); }
  .card-title { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 0.45rem; line-height: 1.4; }
  .card-desc { font-size: 12.5px; color: var(--text2); line-height: 1.6; margin-bottom: 0.75rem; }
  .card-footer { display: flex; align-items: center; justify-content: space-between; }
  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag { font-family: var(--mono); font-size: 10px; color: var(--text3); background: var(--bg); border: 1px solid var(--border); padding: 2px 6px; border-radius: 3px; }
  .card-steps-count { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: nowrap; margin-left: 8px; }

  .no-results { text-align: center; padding: 4rem 2rem; display: none; }
  .no-results.visible { display: block; }
  .no-results pre { font-family: var(--mono); font-size: 13px; color: var(--green); margin-bottom: 1rem; opacity: 0.6; }
  .no-results p { color: var(--text2); font-size: 13px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(5,8,14,0.88); z-index: 200; overflow-y: auto; padding: 2rem 1rem; }
  .modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px; width: 100%; max-width: 740px; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal-header { padding: 1.4rem 1.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
  .modal-title-wrap { flex: 1; }
  .modal-breadcrumb { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .modal-breadcrumb span { color: var(--green); }
  .modal-title { font-family: var(--mono); font-size: 16px; font-weight: 500; color: var(--text); line-height: 1.35; margin-bottom: 8px; }
  .modal-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .modal-close { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text2); font-size: 18px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.15s; }
  .modal-close:hover { color: var(--text); border-color: var(--border2); }
  .modal-body { padding: 1.5rem; }
  .modal-section-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.9rem; display: flex; align-items: center; gap: 8px; }
  .modal-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .symptom-box { background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--amber); border-radius: var(--radius); padding: 0.9rem 1rem; font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 1.25rem; }
  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
  @media (max-width: 600px) { .info-grid { grid-template-columns: 1fr; } }
  .info-box { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.9rem; }
  .info-box-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 0.4rem; }
  .info-box-val { font-size: 13px; color: var(--text2); line-height: 1.6; }
  .steps { list-style: none; margin-bottom: 1.5rem; }
  .step { display: flex; gap: 1rem; margin-bottom: 1rem; align-items: flex-start; }
  .step-num { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--bg2); background: var(--green); border-radius: 3px; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; }
  .step-content { flex: 1; }
  .step-text { font-size: 13.5px; color: var(--text); line-height: 1.65; margin-bottom: 5px; }
  .step-note { font-size: 12px; color: var(--text3); line-height: 1.5; font-style: italic; margin-top: 4px; }
  .warn-note { font-size: 12px; color: var(--amber); line-height: 1.5; margin-top: 4px; }
  .code-block { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); margin: 0.5rem 0 0; overflow: hidden; }
  .code-header { display: flex; align-items: center; justify-content: space-between; padding: 5px 12px; border-bottom: 1px solid var(--border); background: var(--bg3); }
  .code-lang { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.06em; text-transform: uppercase; }
  .copy-btn { font-family: var(--mono); font-size: 11px; background: none; border: 1px solid var(--border2); border-radius: 4px; color: var(--text2); padding: 3px 10px; cursor: pointer; transition: all 0.15s; }
  .copy-btn:hover { color: var(--green); border-color: var(--green-dim); }
  .copy-btn.copied { color: var(--green); border-color: var(--green); }
  code { display: block; font-family: var(--mono); font-size: 12px; color: var(--green); padding: 11px 14px; overflow-x: auto; white-space: pre; line-height: 1.6; }
  .related-links { display: flex; flex-wrap: wrap; gap: 8px; }
  .related-link { font-family: var(--mono); font-size: 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text2); padding: 6px 12px; cursor: pointer; transition: all 0.15s; }
  .related-link:hover { border-color: var(--green-dim); color: var(--green); }
  .related-link::before { content: '→ '; color: var(--green); }
  .escalate-box { background: rgba(255,82,82,0.07); border: 1px solid rgba(255,82,82,0.2); border-radius: var(--radius); padding: 0.9rem 1rem; font-size: 13px; color: #ff8a80; line-height: 1.6; margin-bottom: 1.5rem; }
  .escalate-box strong { color: var(--red); display: block; margin-bottom: 4px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
  @media (max-width: 700px) { .sidebar { display: none; } #searchInput { width: 180px; } }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-brand">
    <span class="prompt">$</span>
    <span>it-knowledge-base</span>
    <span class="cursor"></span>
  </div>
  <div class="topbar-right">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="8.5" cy="8.5" r="5.5"/><path d="M15 15l-3-3"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search: 'internet not working', 'account locked'..." autocomplete="off">
    </div>
    <div class="stat-pill"><span id="countSpan">0</span> articles</div>
  </div>
</header>

<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-section-label">Categories</div>
    <button class="cat-btn active" data-cat="all" onclick="filterCat(this)">
      <span class="cat-icon">⊞</span> All Articles <span class="cat-count" id="count-all">0</span>
    </button>
    <button class="cat-btn" data-cat="networking" onclick="filterCat(this)">
      <span class="cat-icon">⬡</span> Networking <span class="cat-count" id="count-networking">0</span>
    </button>
    <button class="cat-btn" data-cat="accounts" onclick="filterCat(this)">
      <span class="cat-icon">◉</span> Accounts & Access <span class="cat-count" id="count-accounts">0</span>
    </button>
    <button class="cat-btn" data-cat="email" onclick="filterCat(this)">
      <span class="cat-icon">◫</span> Email & Microsoft 365 <span class="cat-count" id="count-email">0</span>
    </button>
    <button class="cat-btn" data-cat="windows" onclick="filterCat(this)">
      <span class="cat-icon">⊟</span> Windows OS <span class="cat-count" id="count-windows">0</span>
    </button>
    <button class="cat-btn" data-cat="printing" onclick="filterCat(this)">
      <span class="cat-icon">⬢</span> Printing <span class="cat-count" id="count-printing">0</span>
    </button>
    <button class="cat-btn" data-cat="hardware" onclick="filterCat(this)">
      <span class="cat-icon">◈</span> Hardware <span class="cat-count" id="count-hardware">0</span>
    </button>
    <button class="cat-btn" data-cat="security" onclick="filterCat(this)">
      <span class="cat-icon">⊕</span> Security <span class="cat-count" id="count-security">0</span>
    </button>
    <button class="cat-btn" data-cat="linux" onclick="filterCat(this)">
      <span class="cat-icon">▣</span> Linux / Server <span class="cat-count" id="count-linux">0</span>
    </button>
    <button class="cat-btn" data-cat="cloud" onclick="filterCat(this)">
      <span class="cat-icon">◎</span> Cloud & Azure <span class="cat-count" id="count-cloud">0</span>
    </button>
    <button class="cat-btn" data-cat="activedirectory" onclick="filterCat(this)">
      <span class="cat-icon">⊛</span> Active Directory <span class="cat-count" id="count-activedirectory">0</span>
    </button>

    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Severity</div>
    <button class="cat-btn" data-sev="high" onclick="filterSev(this)">
      <span class="sev-dot dot-high"></span> High Priority
    </button>
    <button class="cat-btn" data-sev="medium" onclick="filterSev(this)">
      <span class="sev-dot dot-med"></span> Medium Priority
    </button>
    <button class="cat-btn" data-sev="low" onclick="filterSev(this)">
      <span class="sev-dot dot-low"></span> Low / Info
    </button>
  </aside>

  <main class="main">
    <div class="view-header">
      <div class="view-title"><span class="accent">//</span> <span id="viewLabel">All Articles</span></div>
      <div class="view-meta" id="viewMeta"></div>
    </div>
    <div class="active-filters" id="activeFilters"></div>
    <div class="articles-grid" id="articlesGrid"></div>
    <div class="no-results" id="noResults">
      <pre>$ grep -r "$query" ./kb --no-results</pre>
      <p>No articles matched. <a href="#" style="color:var(--green)" onclick="clearAll(event)">Clear all filters</a></p>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div class="modal-header">
      <div class="modal-title-wrap">
        <div class="modal-breadcrumb" id="modalBreadcrumb"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" onclick="closeModal(null)">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// KNOWLEDGE BASE — L1/L2 IT Support Articles
// ─────────────────────────────────────────────────────────────────────────────
const ARTICLES = [

// ══════════════════════════════════════════════════════════
// NETWORKING
// ══════════════════════════════════════════════════════════
{
  id: 1, cat: 'networking', severity: 'high',
  title: 'No internet access — complete outage',
  desc: 'User has no internet connectivity at all. Cannot load any websites or ping external IPs.',
  tags: ['Internet', 'DHCP', 'DNS', 'Network'],
  keywords: 'internet not working no internet cant access websites offline down',
  symptoms: 'Browser shows "No internet connection" or "ERR_NAME_NOT_RESOLVED". Taskbar shows network icon with exclamation or red X. Cannot ping 8.8.8.8.',
  cause: 'DHCP failure (APIPA address), incorrect DNS, NIC disabled, or upstream ISP/router issue.',
  fix: 'Systematic check: physical → IP address → DNS → gateway → ISP.',
  escalate: 'If all users on the same site are affected, escalate to network team — likely upstream router or ISP issue.',
  steps: [
    { text: 'Check physical connection first. Is the ethernet cable seated? Is the Wi-Fi enabled? Look for link light on NIC port.', note: 'Check the physical switch/toggle on laptops — many have an Fn key or dedicated Wi-Fi switch.' },
    { text: 'Check what IP address the machine has received.', code: 'ipconfig /all', lang: 'cmd', note: 'If IP starts with 169.254.x.x — this is an APIPA address, meaning DHCP failed. Jump to Step 4.' },
    { text: 'If IP looks valid (e.g. 192.168.x.x), try pinging the default gateway.', code: 'ping 192.168.1.1', lang: 'cmd', note: 'Replace with your actual gateway IP shown in ipconfig.' },
    { text: 'Release and renew the IP lease to force a fresh DHCP assignment.', code: 'ipconfig /release\nipconfig /renew', lang: 'cmd' },
    { text: 'Flush DNS cache and re-register.', code: 'ipconfig /flushdns\nipconfig /registerdns', lang: 'cmd' },
    { text: 'Try pinging a known external IP (bypasses DNS — tests raw internet).', code: 'ping 8.8.8.8', lang: 'cmd', note: 'If this works but websites don\'t load, the issue is DNS only.' },
    { text: 'Test DNS resolution separately.', code: 'nslookup google.com 8.8.8.8', lang: 'cmd', note: 'If this works, DNS is the issue. Temporarily set DNS to 8.8.8.8 to confirm.' },
    { text: 'Reset TCP/IP stack and Winsock as a last resort.', code: 'netsh int ip reset\nnetsh winsock reset\nshutdown /r /t 0', lang: 'cmd' },
  ],
  related: [2, 3]
},

{
  id: 2, cat: 'networking', severity: 'medium',
  title: 'Wi-Fi connected but no internet access',
  desc: 'Laptop shows "Connected" to Wi-Fi but pages won\'t load and internet is unavailable.',
  tags: ['Wi-Fi', 'Internet', 'DNS', 'Gateway'],
  keywords: 'wifi connected no internet limited access wireless connected but not working',
  symptoms: 'Wi-Fi icon shows connected but browser returns "No internet" or DNS errors. Other devices on same Wi-Fi may work fine.',
  cause: 'DNS issue, captive portal not completed, IP conflict, or corrupted network profile.',
  fix: 'Forget and rejoin network, set DNS manually, check for IP conflicts.',
  steps: [
    { text: 'Open Network & Internet Settings → Status. Click "Network troubleshooter" — it auto-fixes common issues.', note: 'This resolves ~30% of cases without manual work.' },
    { text: 'Check if other devices on the same Wi-Fi have internet. If yes, issue is this device only.', text_only: true },
    { text: 'Forget the network and reconnect fresh.', code: 'netsh wlan disconnect\nnetsh wlan delete profile name="YourSSID"', lang: 'cmd', note: 'You\'ll need the Wi-Fi password to reconnect.' },
    { text: 'Temporarily set DNS to Google DNS to rule out DNS issues.', code: 'netsh interface ip set dns "Wi-Fi" static 8.8.8.8\nnetsh interface ip add dns "Wi-Fi" 8.8.8.8 index=2', lang: 'cmd' },
    { text: 'Check for an IP address conflict.', code: 'arp -a', lang: 'cmd', note: 'Look for duplicate MAC addresses against the same IP — indicates a conflict.' },
    { text: 'Disable and re-enable the Wi-Fi adapter.', code: 'netsh interface set interface "Wi-Fi" disable\nnetsh interface set interface "Wi-Fi" enable', lang: 'cmd' },
    { text: 'Update or rollback Wi-Fi drivers via Device Manager if issue persists after all above.', text_only: true },
  ],
  related: [1, 3]
},

{
  id: 3, cat: 'networking', severity: 'medium',
  title: 'Cannot access network shared drives / mapped drives',
  desc: 'User cannot connect to \\\\servername\\share. Mapped drives show red X or fail to reconnect at login.',
  tags: ['Network Share', 'SMB', 'Mapped Drive', 'Permissions'],
  keywords: 'mapped drive not connecting network share red X cant access file server SMB',
  symptoms: '\\\\server\\share returns "Network path not found" or "Access denied". Drive shows as disconnected in File Explorer.',
  cause: 'DNS not resolving server name, SMB firewall blocked, credentials cached incorrectly, or permission change.',
  fix: 'Test by IP, clear credentials, re-map drive.',
  steps: [

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let currentCat = 'all';
let currentSev = null;
let searchQuery = '';

const CAT_LABELS = {
  all: 'All Articles', networking: 'Networking', accounts: 'Accounts & Access',
  email: 'Email & Microsoft 365', windows: 'Windows OS', printing: 'Printing',
  hardware: 'Hardware', security: 'Security', linux: 'Linux / Server',
  cloud: 'Cloud & Azure', activedirectory: 'Active Directory'
};
const SEV_CLASS = { high: 'sev-high', medium: 'sev-med', low: 'sev-low', info: 'sev-info' };
const SEV_LABEL = { high: 'HIGH', medium: 'MED', low: 'LOW', info: 'INFO' };

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
function init() {
  updateCounts();
  render();
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.toLowerCase();
    render();
  });
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('searchInput').focus(); }
    if (e.key === 'Escape') closeModal(null);
  });
}

function updateCounts() {
  const cats = Object.keys(CAT_LABELS);
  cats.forEach(c => {
    const count = c === 'all' ? ARTICLES.length : ARTICLES.filter(a => a.cat === c).length;
    const el = document.getElementById('count-' + c);
    if (el) el.textContent = count;
  });
  document.getElementById('countSpan').textContent = ARTICLES.length;
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTERING — each filter is independent; changing cat/sev resets the other
// ─────────────────────────────────────────────────────────────────────────────
function filterCat(btn) {
  document.querySelectorAll('.cat-btn[data-cat]').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  // Reset severity when changing category to avoid "no results" confusion
  currentSev = null;
  document.querySelectorAll('.cat-btn[data-sev]').forEach(b => b.classList.remove('active'));
  render();
}

function filterSev(btn) {
  const sev = btn.dataset.sev;
  if (currentSev === sev) {
    currentSev = null;
    btn.classList.remove('active');
  } else {
    document.querySelectorAll('.cat-btn[data-sev]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSev = sev;
    // Reset category to 'all' when filtering by severity to avoid empty results
    currentCat = 'all';
    document.querySelectorAll('.cat-btn[data-cat]').forEach(b => b.classList.remove('active'));
    document.querySelector('.cat-btn[data-cat="all"]').classList.add('active');
  }
  render();
}

function clearAll(e) {
  if (e) e.preventDefault();
  currentCat = 'all';
  currentSev = null;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.cat-btn[data-cat="all"]').classList.add('active');
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function getFiltered() {
  return ARTICLES.filter(a => {
    const matchCat = currentCat === 'all' || a.cat === currentCat;
    const matchSev = !currentSev || a.severity === currentSev || (currentSev === 'low' && (a.severity === 'low' || a.severity === 'info'));
    const searchFields = [a.title, a.desc, a.cat, CAT_LABELS[a.cat] || '', ...(a.tags || []), a.keywords || '', a.symptoms || ''].join(' ').toLowerCase();
    const matchSearch = !searchQuery || searchQuery.split(' ').every(word => searchFields.includes(word));
    return matchCat && matchSev && matchSearch;
  });
}

function render() {
  const filtered = getFiltered();
  const grid = document.getElementById('articlesGrid');
  const noRes = document.getElementById('noResults');
  document.getElementById('viewLabel').textContent = CAT_LABELS[currentCat] || currentCat;
  document.getElementById('viewMeta').textContent = filtered.length ? filtered.length + ' article' + (filtered.length !== 1 ? 's' : '') : '';

  // Active filters display
  const filtersEl = document.getElementById('activeFilters');
  filtersEl.innerHTML = '';
  if (currentSev) {
    const b = document.createElement('div');
    b.className = 'filter-badge';
    b.innerHTML = 'Severity: ' + currentSev + ' <span class="x">✕</span>';
    b.onclick = () => { currentSev = null; document.querySelectorAll('.cat-btn[data-sev]').forEach(x=>x.classList.remove('active')); render(); };
    filtersEl.appendChild(b);
  }
  if (searchQuery) {
    const b = document.createElement('div');
    b.className = 'filter-badge';
    b.innerHTML = 'Search: "' + searchQuery + '" <span class="x">✕</span>';
    b.onclick = () => { searchQuery = ''; document.getElementById('searchInput').value = ''; render(); };
    filtersEl.appendChild(b);
  }

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noRes.classList.add('visible');
    return;
  }
  noRes.classList.remove('visible');
  grid.innerHTML = filtered.map(a => `
    <div class="article-card" onclick="openArticle(${a.id})">
      <div class="card-top">
        <div class="card-severity ${SEV_CLASS[a.severity]}">${SEV_LABEL[a.severity]}</div>
      </div>
      <div class="card-title">${a.title}</div>
      <div class="card-desc">${a.desc}</div>
      <div class="card-footer">
        <div class="card-tags">${(a.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="card-steps-count">${a.steps.length} steps</div>
      </div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────────────────────
function openArticle(id) {
  const a = ARTICLES.find(x => x.id === id);
  if (!a) return;
  document.getElementById('modalBreadcrumb').innerHTML = `<span>${CAT_LABELS[a.cat]}</span> / Troubleshooting`;
  document.getElementById('modalTitle').textContent = a.title;
  document.getElementById('modalMeta').innerHTML = `<span class="card-severity ${SEV_CLASS[a.severity]}">${SEV_LABEL[a.severity]} severity</span>` + (a.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');

  let body = '';

  if (a.escalate) {
    body += `<div class="escalate-box"><strong>⚠ Escalation Required</strong>${a.escalate}</div>`;
  }

  body += `<div class="modal-section-label">Symptoms</div>
  <div class="symptom-box">${a.symptoms}</div>
  <div class="info-grid">
    <div class="info-box"><div class="info-box-label">Root Cause</div><div class="info-box-val">${a.cause}</div></div>
    <div class="info-box"><div class="info-box-label">Resolution Approach</div><div class="info-box-val">${a.fix}</div></div>
  </div>
  <div class="modal-section-label">Step-by-Step Fix</div>
  <ul class="steps">`;

  a.steps.forEach((s, i) => {
    body += `<li class="step">
      <div class="step-num">${i+1}</div>
      <div class="step-content">
        <div class="step-text">${s.text}</div>
        ${s.note ? `<div class="step-note">${s.note}</div>` : ''}
        ${s.warn ? `<div class="warn-note">⚠ ${s.warn}</div>` : ''}
        ${s.code ? `<div class="code-block">
          <div class="code-header">
            <span class="code-lang">${s.lang||'bash'}</span>
            <button class="copy-btn" onclick="copyCode(this,\`${s.code.replace(/\\/g,'\\\\').replace(/`/g,'\\`')}\`)">Copy</button>
          </div>
          <code>${escHtml(s.code)}</code>
        </div>` : ''}
      </div>
    </li>`;
  });

  body += '</ul>';

  if (a.related && a.related.length) {
    const rels = ARTICLES.filter(x => a.related.includes(x.id));
    if (rels.length) {
      body += `<div class="modal-section-label">Related Articles</div><div class="related-links">${rels.map(r=>`<button class="related-link" onclick="openArticle(${r.id})">${r.title}</button>`).join('')}</div>`;
    }
  }

  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function copyCode(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

init();
</script>
</body>
</html>
